services:
  app:
    build: .
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      # Run mix phx.gen.secret to generate your own.
      SECRET_KEY_BASE: 1DdaMAX56nUh1tvXniEEuQNsGNvgADndawxrJ3YFZlLXc9EOahC/NFDgowCDUFwb
      PHX_HOST: localhost
      # Disable this in prod.
      MAILBOX_PREVIEW_ENABLED: true
      # Use dev for localhost.
      MIX_ENV: dev
    volumes:
      # Live-edit the hook source. Only each plugin's lib/ is mounted so the
      # image-built _build/deps/ebin stay intact (avoids "<plugin>.app not found"
      # and host/container arch clashes). The Dockerfile CMD rebuilds the plugins
      # on start, so a `docker compose restart app` picks up your code changes.
      # You can also reload plugins from Admin → Config without a restart.
      - ./modules/plugins/starter_hook/lib:/app/modules/plugins/starter_hook/lib
      - ./modules/plugins/example_hook/lib:/app/modules/plugins/example_hook/lib
      # Persist the SQLite dev database across restarts.
      - ./db:/app/db
